openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FACTA — Independent product intelligence API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: evaluations
    description: FACTA scoring and reports
  - name: alternatives
    description: Alternative product recommendations
  - name: scan
    description: Barcode scanning and history
  - name: submissions
    description: Unknown product submissions and OCR
  - name: preferences
    description: User allergen and dietary preferences
  - name: goals
    description: Goals, Goal Fit, and user profile
  - name: mealLogs
    description: My Day meal logging
  - name: guides
    description: FACTA Guides editorial content
  - name: collections
    description: Curated product collections
  - name: admin
    description: Admin review and management

paths:
  # ── Goals ─────────────────────────────────────────────────────────────────

  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List all goals
      parameters:
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GoalSummary"

  /goals/{slug}:
    get:
      operationId: getGoal
      tags: [goals]
      summary: Get goal detail with meal contexts
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Goal detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user-goals/{sessionId}:
    get:
      operationId: getUserGoals
      tags: [goals]
      summary: Get user's active goals
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User goals with profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGoalsResponse"
    put:
      operationId: setUserGoals
      tags: [goals]
      summary: Set user goals (max 2 active)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserGoalsInput"
      responses:
        "200":
          description: Updated user goals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGoalsResponse"

  /profile/{sessionId}:
    get:
      operationId: getUserProfile
      tags: [goals]
      summary: Get user onboarding profile
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: saveUserProfile
      tags: [goals]
      summary: Save / update user onboarding profile
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "200":
          description: Saved profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ── Goal Fit ───────────────────────────────────────────────────────────────

  /goal-fit/{productId}/{goalSlug}:
    get:
      operationId: getGoalFit
      tags: [goals]
      summary: Compute Goal Fit for a product × goal pair
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
        - name: goalSlug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Goal fit result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalFitResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Meal Logs ─────────────────────────────────────────────────────────────

  /meal-logs:
    get:
      operationId: listMealLogs
      tags: [mealLogs]
      summary: List meal logs for a session and date
      parameters:
        - name: session_id
          in: query
          required: true
          schema: { type: string }
        - name: date_str
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Meal logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealLog"
    post:
      operationId: addMealLog
      tags: [mealLogs]
      summary: Log a product to a meal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealLogInput"
      responses:
        "201":
          description: Created meal log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealLog"

  /meal-logs/{id}:
    delete:
      operationId: deleteMealLog
      tags: [mealLogs]
      summary: Delete a meal log entry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  # ── Search ────────────────────────────────────────────────────────────────

  /search:
    get:
      operationId: searchProducts
      tags: [products]
      summary: Contextual natural language + structured product search
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: goal_slug
          in: query
          schema: { type: ["string", "null"] }
        - name: meal_type
          in: query
          schema: { type: ["string", "null"] }
        - name: retailer_slug
          in: query
          schema: { type: ["string", "null"] }
        - name: session_id
          in: query
          schema: { type: ["string", "null"] }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  # ── Guides ────────────────────────────────────────────────────────────────

  /guides:
    get:
      operationId: listGuides
      tags: [guides]
      summary: List published FACTA Guides
      parameters:
        - name: goal_slug
          in: query
          schema: { type: ["string", "null"] }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: Guides
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuideSummary"

  /guides/{slug}:
    get:
      operationId: getGuide
      tags: [guides]
      summary: Get a FACTA Guide by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Guide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuideDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Collections ───────────────────────────────────────────────────────────

  /collections:
    get:
      operationId: listCollections
      tags: [collections]
      summary: List published curated collections
      parameters:
        - name: goal_slug
          in: query
          schema: { type: ["string", "null"] }
        - name: meal_type
          in: query
          schema: { type: ["string", "null"] }
        - name: retailer_slug
          in: query
          schema: { type: ["string", "null"] }
      responses:
        "200":
          description: Collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollectionSummary"

  /collections/{slug}:
    get:
      operationId: getCollection
      tags: [collections]
      summary: Get a collection with its products
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Collection detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Admin — Goals ─────────────────────────────────────────────────────────

  /admin/goals:
    post:
      operationId: adminCreateGoal
      tags: [admin]
      summary: Create a goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminGoalInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalSummary"

  /admin/goals/{id}:
    patch:
      operationId: adminUpdateGoal
      tags: [admin]
      summary: Update a goal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminGoalInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalSummary"

  /admin/goal-rulesets:
    post:
      operationId: adminPublishGoalRuleset
      tags: [admin]
      summary: Publish a goal ruleset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminGoalRulesetInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  goalId: { type: integer }
                  version: { type: string }
                  status: { type: string }

  /admin/meal-contexts/{id}:
    patch:
      operationId: adminUpdateMealContext
      tags: [admin]
      summary: Update meal context guidance
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminMealContextInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  status: { type: string }

  /admin/guides:
    post:
      operationId: adminCreateGuide
      tags: [admin]
      summary: Create a guide
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminGuideInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuideSummary"

  /admin/guides/{id}:
    patch:
      operationId: adminUpdateGuide
      tags: [admin]
      summary: Update a guide
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminGuideInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuideSummary"

  /admin/collections:
    post:
      operationId: adminCreateCollection
      tags: [admin]
      summary: Create a curated collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCollectionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionSummary"

  /admin/collections/{id}:
    patch:
      operationId: adminUpdateCollection
      tags: [admin]
      summary: Update a collection
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCollectionInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionSummary"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Products ──────────────────────────────────────────────────────────────

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
        - name: retailer_id
          in: query
          schema: { type: ["integer", "null"] }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductSummary"

  /products/barcode/{barcode}:
    get:
      operationId: getProductByBarcode
      tags: [products]
      summary: Look up product by barcode
      parameters:
        - name: barcode
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get full product detail
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Evaluations (FACTA Reports) ───────────────────────────────────────────

  /evaluations/product/{productId}:
    get:
      operationId: getProductEvaluation
      tags: [evaluations]
      summary: Get latest FACTA Report for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: FACTA Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Alternatives ──────────────────────────────────────────────────────────

  /alternatives/{productId}:
    get:
      operationId: getAlternatives
      tags: [alternatives]
      summary: Get better alternative products
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Alternative products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlternativeProduct"

  # ── Scan history ─────────────────────────────────────────────────────────

  /scan/history:
    get:
      operationId: getScanHistory
      tags: [scan]
      summary: Get recent scan history for session
      parameters:
        - name: user_session
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Scan history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanEvent"
    post:
      operationId: recordScan
      tags: [scan]
      summary: Record a scan event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanEventInput"
      responses:
        "201":
          description: Scan recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanEvent"

  # ── Submissions (unknown products) ────────────────────────────────────────

  /submissions:
    post:
      operationId: createSubmission
      tags: [submissions]
      summary: Submit an unknown product for review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionInput"
      responses:
        "201":
          description: Submission created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /submissions/{id}:
    get:
      operationId: getSubmission
      tags: [submissions]
      summary: Get submission status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /submissions/{id}/confirm-ocr:
    patch:
      operationId: confirmOcr
      tags: [submissions]
      summary: User confirms or corrects OCR results
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OcrConfirmation"
      responses:
        "200":
          description: OCR confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /submissions/{id}/finalize:
    post:
      operationId: finalizeSubmission
      tags: [submissions]
      summary: Instantly create a provisional product from a confirmed submission and score it
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Provisional product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizeResult"
        "404":
          description: Submission not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /safety-alerts:
    get:
      operationId: listSafetyAlerts
      summary: List active government food-safety alerts
      tags: [safety]
      responses:
        "200":
          description: Active alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafetyAlertsResponse"
  /products/{id}/safety-check:
    get:
      operationId: getProductSafetyCheck
      summary: Check whether a product is affected by an active safety alert
      tags: [safety]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Safety check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafetyCheckResponse"
        "404":
          description: Product not found
  /products/{id}/news:
    get:
      operationId: getProductNews
      tags: [products]
      summary: AI web search for brand/product news with sentiment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: News intelligence for this product's brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductNewsResponse"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /submissions/ocr:
    post:
      operationId: processOcr
      tags: [submissions]
      summary: Run OCR on uploaded image and return extracted text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OcrRequest"
      responses:
        "200":
          description: OCR result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OcrResult"

  # ── User Preferences ──────────────────────────────────────────────────────

  /preferences/{sessionId}:
    get:
      operationId: getPreferences
      tags: [preferences]
      summary: Get user preferences
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: savePreferences
      tags: [preferences]
      summary: Save user preferences
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPreferencesInput"
      responses:
        "200":
          description: Preferences saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"

  # ── Retailers & Reference Data ────────────────────────────────────────────

  /retailers:
    get:
      operationId: listRetailers
      tags: [products]
      summary: List retailers
      responses:
        "200":
          description: Retailers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Retailer"

  /categories:
    get:
      operationId: listCategories
      tags: [products]
      summary: List product categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # ── Data Corrections ──────────────────────────────────────────────────────

  /corrections:
    post:
      operationId: submitCorrection
      tags: [products]
      summary: Report a data error on a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrectionInput"
      responses:
        "201":
          description: Correction submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Correction"

  # ── Share Cards ───────────────────────────────────────────────────────────

  /share-cards/{productId}:
    get:
      operationId: getShareCard
      tags: [evaluations]
      summary: Get share card data for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Share card data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareCard"

  # ── Dashboard / wow endpoints ─────────────────────────────────────────────

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [products]
      summary: App-level statistics (products verified, scans today, etc.)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /products/recent:
    get:
      operationId: listRecentProducts
      tags: [products]
      summary: Recently verified products (for homepage showcase)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 6 }
      responses:
        "200":
          description: Recent products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductSummary"

  # ── Admin ─────────────────────────────────────────────────────────────────

  /admin/pending:
    get:
      operationId: adminListPending
      tags: [admin]
      summary: List pending submissions awaiting review
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Pending submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"

  /admin/submissions/{id}/verify:
    post:
      operationId: adminVerifySubmission
      tags: [admin]
      summary: Verify (approve) a pending submission
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecision"
      responses:
        "200":
          description: Review recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /admin/submissions/{id}/reject:
    post:
      operationId: adminRejectSubmission
      tags: [admin]
      summary: Reject a pending submission
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecision"
      responses:
        "200":
          description: Review recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /admin/products/{id}:
    patch:
      operationId: adminUpdateProduct
      tags: [admin]
      summary: Admin edit product data
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /admin/corrections:
    get:
      operationId: adminListCorrections
      tags: [admin]
      summary: List reported data corrections
      responses:
        "200":
          description: Corrections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Correction"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    FinalizeResult:
      type: object
      required: [productId, analysisScope]
      properties:
        productId: { type: integer }
        overallScore: { type: integer }
        scoreGrade: { type: string }
        analysisScope:
          type: string
          enum: [complete, nutrition_only, ingredients_only, insufficient]

    SafetyAlert:
      type: object
      required: [id, slug, title, titleZh, summary, summaryZh, severity, sourceUrls, publishedAt]
      properties:
        id: { type: integer }
        slug: { type: string }
        title: { type: string }
        titleZh: { type: string }
        summary: { type: string }
        summaryZh: { type: string }
        contaminant: { type: ["string", "null"] }
        contaminantZh: { type: ["string", "null"] }
        severity: { type: string, enum: [high, medium, low] }
        officialUrl: { type: ["string", "null"] }
        sourceUrls:
          type: array
          items: { type: string }
        publishedAt: { type: string }
    SafetyAlertsResponse:
      type: object
      required: [alerts]
      properties:
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/SafetyAlert"
    SafetyAlertMatch:
      type: object
      required: [alert, matchedBusiness, matchedKeyword, productExamples]
      properties:
        alert:
          $ref: "#/components/schemas/SafetyAlert"
        matchedBusiness: { type: string }
        matchedKeyword: { type: string }
        productExamples:
          type: array
          items: { type: string }
    SafetyCheckResponse:
      type: object
      required: [affected, matches]
      properties:
        affected: { type: boolean }
        matches:
          type: array
          items:
            $ref: "#/components/schemas/SafetyAlertMatch"
    NewsArticle:
      type: object
      required: [title, reportType, scope]
      properties:
        title: { type: string }
        url: { type: ["string", "null"] }
        sourceName: { type: ["string", "null"] }
        publishedAt: { type: ["string", "null"] }
        reportType:
          type: string
          enum: [news, official_record, advertorial, press_release, unknown]
        scope:
          type: string
          enum: [product, brand, company]
        affectsProduct: { type: ["boolean", "null"] }

    ProductNewsResponse:
      type: object
      required: [sentiment, articles, status, query, lookbackDays]
      properties:
        sentiment:
          type: string
          enum: [positive, negative, mixed, neutral, none]
        status:
          type: string
          enum: [fresh, cached, stale, no_results, unavailable, identity_unverified]
        query: { type: string }
        lookbackDays: { type: integer }
        summary: { type: ["string", "null"] }
        summaryZh: { type: ["string", "null"] }
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"
        fetchedAt: { type: ["string", "null"] }

    # ── Core entities ─────────────────────────────────────────────────────

    Retailer:
      type: object
      required: [id, name, slug]
      properties:
        id:   { type: integer }
        name: { type: string }
        slug: { type: string }
        logoUrl: { type: ["string", "null"] }

    Category:
      type: object
      required: [id, name, slug]
      properties:
        id:   { type: integer }
        name: { type: string }
        slug: { type: string }
        nameZh: { type: ["string", "null"] }

    NutritionFact:
      type: object
      required: [id, productId]
      properties:
        id:               { type: integer }
        productId:        { type: integer }
        servingSize:      { type: ["string", "null"] }
        servingSizeUnit:  { type: ["string", "null"] }
        calories:         { type: ["number", "null"] }
        totalFat:         { type: ["number", "null"] }
        saturatedFat:     { type: ["number", "null"] }
        transFat:         { type: ["number", "null"] }
        sodium:           { type: ["number", "null"] }
        totalCarbs:       { type: ["number", "null"] }
        dietaryFiber:     { type: ["number", "null"] }
        totalSugars:      { type: ["number", "null"] }
        protein:          { type: ["number", "null"] }

    IngredientItem:
      type: object
      required: [id, name]
      properties:
        id:             { type: integer }
        name:           { type: string }
        nameZh:         { type: ["string", "null"] }
        riskLevel:      { type: ["string", "null"] }
        riskReason:     { type: ["string", "null"] }
        evidenceStrength: { type: ["string", "null"] }
        isAdditive:     { type: boolean }

    AllergenAlert:
      type: object
      required: [name, severity]
      properties:
        name:     { type: string }
        nameZh:   { type: ["string", "null"] }
        severity: { type: string }
        source:   { type: ["string", "null"] }

    ProductSummary:
      type: object
      required: [id, name, verificationStatus]
      properties:
        id:                 { type: integer }
        name:               { type: string }
        nameZh:             { type: ["string", "null"] }
        brandName:          { type: ["string", "null"] }
        imageUrl:           { type: ["string", "null"] }
        categorySlug:       { type: ["string", "null"] }
        categoryName:       { type: ["string", "null"] }
        verificationStatus: { type: string }
        overallScore:       { type: ["integer", "null"] }
        scoreGrade:         { type: ["string", "null"] }
        barcode:            { type: ["string", "null"] }
        retailerName:       { type: ["string", "null"] }
        priceNtd:           { type: ["number", "null"] }

    Product:
      type: object
      required: [id, name, verificationStatus]
      properties:
        id:                 { type: integer }
        name:               { type: string }
        nameZh:             { type: ["string", "null"] }
        brandName:          { type: ["string", "null"] }
        imageUrl:           { type: ["string", "null"] }
        barcode:            { type: ["string", "null"] }
        categorySlug:       { type: ["string", "null"] }
        categoryName:       { type: ["string", "null"] }
        categoryNameZh:     { type: ["string", "null"] }
        verificationStatus: { type: string }
        dataCompleteness:   { type: ["number", "null"] }
        retailerName:       { type: ["string", "null"] }
        retailerId:         { type: ["integer", "null"] }
        priceNtd:           { type: ["number", "null"] }
        netWeight:          { type: ["string", "null"] }
        catalogSourceUrl:   { type: ["string", "null"] }
        barcodeSourceUrl:   { type: ["string", "null"] }
        ingredientsList:    { type: ["string", "null"] }
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/IngredientItem"
        nutritionFacts:
          oneOf:
            - $ref: "#/components/schemas/NutritionFact"
            - type: "null"
        allergens:
          type: array
          items:
            $ref: "#/components/schemas/AllergenAlert"
        createdAt:  { type: string }
        updatedAt:  { type: string }

    # ── Evaluation / FACTA Report ─────────────────────────────────────────

    EvaluationReason:
      type: object
      required: [label, impact]
      properties:
        label:           { type: string }
        labelZh:         { type: ["string", "null"] }
        impact:          { type: string }
        evidenceStrength: { type: ["string", "null"] }
        source:          { type: ["string", "null"] }

    AdditiveFlag:
      type: object
      required: [name, riskLevel]
      properties:
        name:            { type: string }
        nameZh:          { type: ["string", "null"] }
        riskLevel:       { type: string }
        reason:          { type: ["string", "null"] }
        evidenceStrength: { type: ["string", "null"] }

    PersonalAlert:
      type: object
      required: [type, message]
      properties:
        type:       { type: string }
        message:    { type: string }
        messageZh:  { type: ["string", "null"] }
        severity:   { type: string }

    Evaluation:
      type: object
      required: [id, productId, overallScore, analysisScope, scoreGrade, verdict, verificationStatus, rulesetVersion, evaluatedAt]
      properties:
        id:                  { type: integer }
        productId:           { type: integer }
        productName:         { type: ["string", "null"] }
        productNameZh:       { type: ["string", "null"] }
        brandName:           { type: ["string", "null"] }
        imageUrl:            { type: ["string", "null"] }
        overallScore:        { type: integer }
        nutritionScore:      { type: ["integer", "null"] }
        additiveScore:       { type: ["integer", "null"] }
        analysisScope:
          type: string
          enum: [complete, nutrition_only, ingredients_only, insufficient]
        scoreGrade:          { type: string }
        verdict:             { type: string }
        verdictZh:           { type: ["string", "null"] }
        verificationStatus:  { type: string }
        dataCompleteness:    { type: ["number", "null"] }
        evidenceConfidence:  { type: ["string", "null"] }
        rulesetVersion:      { type: string }
        evaluatedAt:         { type: string }
        topReasons:
          type: array
          items:
            $ref: "#/components/schemas/EvaluationReason"
        additiveFlags:
          type: array
          items:
            $ref: "#/components/schemas/AdditiveFlag"
        allergenAlerts:
          type: array
          items:
            $ref: "#/components/schemas/AllergenAlert"
        personalAlerts:
          type: array
          items:
            $ref: "#/components/schemas/PersonalAlert"

    # ── Alternatives ──────────────────────────────────────────────────────

    AlternativeProduct:
      type: object
      required: [product, whyBetter]
      properties:
        product:
          $ref: "#/components/schemas/ProductSummary"
        scoreImprovement:  { type: ["integer", "null"] }
        whyBetter:         { type: string }
        whyBetterZh:       { type: ["string", "null"] }
        priceDifferenceNtd: { type: ["number", "null"] }
        sameRetailer:      { type: boolean }

    # ── Scan Events ───────────────────────────────────────────────────────

    ScanEvent:
      type: object
      required: [id, eventType, createdAt]
      properties:
        id:          { type: integer }
        eventType:   { type: string }
        barcode:     { type: ["string", "null"] }
        productId:   { type: ["integer", "null"] }
        productName: { type: ["string", "null"] }
        productScore: { type: ["integer", "null"] }
        productGrade: { type: ["string", "null"] }
        imageUrl:    { type: ["string", "null"] }
        userSession: { type: ["string", "null"] }
        hasUpdate:   { type: boolean }
        createdAt:   { type: string }

    ScanEventInput:
      type: object
      required: [eventType]
      properties:
        eventType:   { type: string }
        barcode:     { type: ["string", "null"] }
        productId:   { type: ["integer", "null"] }
        userSession: { type: ["string", "null"] }

    # ── Submissions ───────────────────────────────────────────────────────

    OcrRequest:
      type: object
      required: [imageBase64]
      properties:
        imageBase64:  { type: string }
        imageType:    { type: string, default: "ingredients" }
        imageMimeType:
          type: string
          enum: [image/jpeg, image/png, image/webp]
          default: image/jpeg

    OcrResult:
      type: object
      required: [extractedText, confidence]
      properties:
        extractedText:      { type: string }
        confidence:         { type: number }
        structuredData:
          type: object
          additionalProperties: true
        rawIngredients:     { type: ["string", "null"] }
        parsedNutrition:
          type: object
          additionalProperties: true
        productName:        { type: ["string", "null"] }
        brandName:          { type: ["string", "null"] }

    SubmissionInput:
      type: object
      required: [productName]
      properties:
        productName:      { type: string }
        brandName:        { type: ["string", "null"] }
        barcode:          { type: ["string", "null"] }
        retailerSlug:     { type: ["string", "null"] }
        rawIngredientsText: { type: ["string", "null"] }
        userSession:      { type: ["string", "null"] }
        userConsented:    { type: boolean, default: false }

    OcrConfirmation:
      type: object
      required: [confirmedIngredients]
      properties:
        confirmedIngredients: { type: string }
        confirmedNutrition:
          type: object
          additionalProperties: true
        confirmedProductName: { type: ["string", "null"] }
        confirmedBrandName:   { type: ["string", "null"] }
        userCorrections:  { type: ["string", "null"] }

    Submission:
      type: object
      required: [id, productName, status, createdAt]
      properties:
        id:              { type: integer }
        productName:     { type: string }
        brandName:       { type: ["string", "null"] }
        barcode:         { type: ["string", "null"] }
        status:          { type: string }
        ocrStatus:       { type: ["string", "null"] }
        extractedIngredients: { type: ["string", "null"] }
        provisionalScore: { type: ["integer", "null"] }
        provisionalGrade: { type: ["string", "null"] }
        dataCompleteness: { type: ["number", "null"] }
        userSession:     { type: ["string", "null"] }
        reviewNote:      { type: ["string", "null"] }
        createdAt:       { type: string }
        updatedAt:       { type: string }

    # ── User Preferences ──────────────────────────────────────────────────

    UserPreferencesInput:
      type: object
      properties:
        allergens:
          type: array
          items: { type: string }
        dietaryPreferences:
          type: array
          items: { type: string }
        avoidIngredients:
          type: array
          items: { type: string }
        locale: { type: string, default: "zh-TW" }

    UserPreferences:
      type: object
      required: [sessionId, allergens, dietaryPreferences, avoidIngredients, locale]
      properties:
        sessionId:          { type: string }
        allergens:
          type: array
          items: { type: string }
        dietaryPreferences:
          type: array
          items: { type: string }
        avoidIngredients:
          type: array
          items: { type: string }
        locale:             { type: string }
        updatedAt:          { type: string }

    # ── Corrections ───────────────────────────────────────────────────────

    CorrectionInput:
      type: object
      required: [productId, issueType, description]
      properties:
        productId:   { type: integer }
        issueType:   { type: string }
        description: { type: string }
        userSession: { type: ["string", "null"] }

    Correction:
      type: object
      required: [id, productId, issueType, status, createdAt]
      properties:
        id:          { type: integer }
        productId:   { type: integer }
        issueType:   { type: string }
        description: { type: ["string", "null"] }
        status:      { type: string }
        userSession: { type: ["string", "null"] }
        createdAt:   { type: string }

    # ── Share Card ────────────────────────────────────────────────────────

    ShareCard:
      type: object
      required: [productName, overallScore, analysisScope, scoreGrade, verdict]
      properties:
        productName:       { type: string }
        productNameZh:     { type: ["string", "null"] }
        brandName:         { type: ["string", "null"] }
        imageUrl:          { type: ["string", "null"] }
        overallScore:      { type: integer }
        analysisScope:
          type: string
          enum: [complete, nutrition_only, ingredients_only, insufficient]
        scoreGrade:        { type: string }
        verdict:           { type: string }
        verdictZh:         { type: ["string", "null"] }
        topReasons:
          type: array
          items:
            $ref: "#/components/schemas/EvaluationReason"
        evidenceConfidence: { type: ["string", "null"] }
        alternativeName:   { type: ["string", "null"] }
        alternativeNameZh: { type: ["string", "null"] }
        rulesetVersion:    { type: string }
        evaluatedAt:       { type: string }

    # ── Dashboard ─────────────────────────────────────────────────────────

    DashboardStats:
      type: object
      required: [totalProducts, verifiedProducts, totalScans, pendingReviews]
      properties:
        totalProducts:    { type: integer }
        verifiedProducts: { type: integer }
        totalScans:       { type: integer }
        pendingReviews:   { type: integer }
        scansToday:       { type: integer }

    # ── Goals ─────────────────────────────────────────────────────────────

    GoalSummary:
      type: object
      required: [id, slug, name, nameZh, status]
      properties:
        id:            { type: integer }
        slug:          { type: string }
        name:          { type: string }
        nameZh:        { type: string }
        description:   { type: ["string", "null"] }
        descriptionZh: { type: ["string", "null"] }
        status:        { type: string }
        icon:          { type: ["string", "null"] }
        sortOrder:     { type: integer }

    MealContextSummary:
      type: object
      required: [id, meal, headlineZh, chooseMoreZh, chooseLessZh]
      properties:
        id:            { type: integer }
        meal:          { type: string }
        headline:      { type: string }
        headlineZh:    { type: string }
        chooseMore:    { type: array, items: { type: string } }
        chooseMoreZh:  { type: array, items: { type: string } }
        chooseLess:    { type: array, items: { type: string } }
        chooseLessZh:  { type: array, items: { type: string } }
        ctaText:       { type: ["string", "null"] }
        ctaTextZh:     { type: ["string", "null"] }

    GoalDetail:
      allOf:
        - $ref: "#/components/schemas/GoalSummary"
        - type: object
          properties:
            mealContexts:
              type: array
              items:
                $ref: "#/components/schemas/MealContextSummary"
            guides:
              type: array
              items:
                $ref: "#/components/schemas/GuideSummary"

    UserGoalsResponse:
      type: object
      required: [sessionId, activeGoals]
      properties:
        sessionId:    { type: string }
        activeGoals:
          type: array
          items:
            type: object
            properties:
              goalId:   { type: integer }
              goalSlug: { type: string }
              goalName: { type: string }
              goalNameZh: { type: string }
              priority: { type: string }
              status:   { type: string }
        profile:
          $ref: "#/components/schemas/UserProfile"
        onboardingCompleted: { type: boolean }

    UserGoalsInput:
      type: object
      required: [goals]
      properties:
        goals:
          type: array
          maxItems: 2
          items:
            type: object
            required: [goalId, priority]
            properties:
              goalId:   { type: integer }
              priority: { type: string }

    UserProfile:
      type: object
      required: [sessionId]
      properties:
        sessionId:          { type: string }
        preferredRetailers: { type: array, items: { type: string } }
        budgetTier:         { type: ["string", "null"] }
        wantsMealTiming:    { type: boolean }
        onboardingCompleted: { type: boolean }
        updatedAt:          { type: string }

    UserProfileInput:
      type: object
      properties:
        preferredRetailers: { type: array, items: { type: string } }
        budgetTier:         { type: ["string", "null"] }
        wantsMealTiming:    { type: boolean }
        onboardingCompletedAt: { type: ["string", "null"] }

    # ── Goal Fit ──────────────────────────────────────────────────────────

    FitReason:
      type: object
      required: [label, labelZh, positive]
      properties:
        label:    { type: string }
        labelZh:  { type: string }
        positive: { type: boolean }

    GoalFitResult:
      type: object
      required: [productId, goalSlug, fitLevel, goalRulesetVersion]
      properties:
        productId:           { type: integer }
        goalSlug:            { type: string }
        goalName:            { type: ["string", "null"] }
        goalNameZh:          { type: ["string", "null"] }
        fitLevel:            { type: string }
        fitReasons:
          type: array
          items:
            $ref: "#/components/schemas/FitReason"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/FitReason"
        breakfastFit:        { type: string }
        lunchFit:            { type: string }
        dinnerFit:           { type: string }
        snackFit:            { type: string }
        inputDataCompleteness: { type: ["number", "null"] }
        goalRulesetVersion:  { type: string }
        evaluatedAt:         { type: string }

    # ── Meal Logs ─────────────────────────────────────────────────────────

    MealLogInput:
      type: object
      required: [sessionId, productId, mealType, dateStr]
      properties:
        sessionId: { type: string }
        productId: { type: integer }
        mealType:  { type: string }
        dateStr:   { type: string }
        note:      { type: ["string", "null"] }

    MealLog:
      type: object
      required: [id, sessionId, productId, mealType, dateStr, loggedAt]
      properties:
        id:          { type: integer }
        sessionId:   { type: string }
        productId:   { type: integer }
        mealType:    { type: string }
        dateStr:     { type: string }
        loggedAt:    { type: string }
        note:        { type: ["string", "null"] }
        productName: { type: ["string", "null"] }
        productNameZh: { type: ["string", "null"] }
        imageUrl:    { type: ["string", "null"] }
        overallScore: { type: ["integer", "null"] }
        scoreGrade:  { type: ["string", "null"] }

    # ── Search ────────────────────────────────────────────────────────────

    SearchResultItem:
      type: object
      required: [product, relevanceLabel]
      properties:
        product:
          $ref: "#/components/schemas/ProductSummary"
        relevanceLabel:   { type: string }
        relevanceLabelZh: { type: ["string", "null"] }
        fitLevel:         { type: ["string", "null"] }
        matchReasons:     { type: array, items: { type: string } }
        matchReasonsZh:   { type: array, items: { type: string } }

    SearchResults:
      type: object
      required: [query, products]
      properties:
        query:        { type: string }
        parsedFilters:
          type: object
          additionalProperties: true
        products:
          type: array
          items:
            $ref: "#/components/schemas/SearchResultItem"
        guides:
          type: array
          items:
            $ref: "#/components/schemas/GuideSummary"
        catalogItems:
          type: array
          items:
            $ref: "#/components/schemas/CatalogSeedItem"
        total:        { type: integer }
        hasMore:      { type: boolean }

    CatalogSeedItem:
      type: object
      required: [factaSeedId, productName, retailer]
      properties:
        factaSeedId:   { type: string }
        productName:   { type: string }
        brandRaw:      { type: ["string", "null"] }
        retailer:      { type: string }
        categoryNormalized: { type: ["string", "null"] }
        specRaw:       { type: ["string", "null"] }
        priceTwd:      { type: ["number", "null"] }
        imageUrl:      { type: ["string", "null"] }
        sourceUrl:     { type: ["string", "null"] }

    # ── Guides ────────────────────────────────────────────────────────────

    GuideSummary:
      type: object
      required: [id, slug, titleZh, status]
      properties:
        id:          { type: integer }
        slug:        { type: string }
        title:       { type: string }
        titleZh:     { type: string }
        summaryZh:   { type: ["string", "null"] }
        summary:     { type: ["string", "null"] }
        goalId:      { type: ["integer", "null"] }
        coverImageUrl: { type: ["string", "null"] }
        status:      { type: string }
        publishedAt: { type: ["string", "null"] }

    GuideDetail:
      allOf:
        - $ref: "#/components/schemas/GuideSummary"
        - type: object
          properties:
            bodyZh:      { type: ["string", "null"] }
            body:        { type: ["string", "null"] }
            limitationsZh: { type: ["string", "null"] }
            limitations: { type: ["string", "null"] }
            sources:
              type: array
              items:
                type: object
                properties:
                  citation:      { type: string }
                  url:           { type: ["string", "null"] }
                  publishedYear: { type: ["integer", "null"] }
            evidenceLastReviewedAt: { type: ["string", "null"] }
            reviewDueDate:          { type: ["string", "null"] }

    # ── Collections ───────────────────────────────────────────────────────

    CollectionSummary:
      type: object
      required: [id, slug, nameZh, status]
      properties:
        id:            { type: integer }
        slug:          { type: string }
        name:          { type: string }
        nameZh:        { type: string }
        descriptionZh: { type: ["string", "null"] }
        goalId:        { type: ["integer", "null"] }
        retailerId:    { type: ["integer", "null"] }
        mealType:      { type: ["string", "null"] }
        status:        { type: string }
        productCount:  { type: integer }

    CollectionDetail:
      allOf:
        - $ref: "#/components/schemas/CollectionSummary"
        - type: object
          properties:
            products:
              type: array
              items:
                type: object
                properties:
                  product:
                    $ref: "#/components/schemas/ProductSummary"
                  reason:    { type: ["string", "null"] }
                  reasonZh:  { type: ["string", "null"] }

    # ── Admin input schemas ────────────────────────────────────────────────

    AdminGoalInput:
      type: object
      properties:
        slug:          { type: string }
        name:          { type: string }
        nameZh:        { type: string }
        description:   { type: ["string", "null"] }
        descriptionZh: { type: ["string", "null"] }
        status:        { type: string }
        icon:          { type: ["string", "null"] }
        sortOrder:     { type: integer }

    AdminGoalRulesetInput:
      type: object
      required: [goalId, version, rules]
      properties:
        goalId:       { type: integer }
        version:      { type: string }
        description:  { type: ["string", "null"] }
        rules:        { type: object, additionalProperties: true }
        status:       { type: string }

    AdminMealContextInput:
      type: object
      properties:
        headline:      { type: string }
        headlineZh:    { type: string }
        chooseMore:    { type: array, items: { type: string } }
        chooseMoreZh:  { type: array, items: { type: string } }
        chooseLess:    { type: array, items: { type: string } }
        chooseLessZh:  { type: array, items: { type: string } }
        ctaText:       { type: ["string", "null"] }
        ctaTextZh:     { type: ["string", "null"] }
        status:        { type: string }

    AdminGuideInput:
      type: object
      properties:
        slug:          { type: string }
        title:         { type: string }
        titleZh:       { type: string }
        summaryZh:     { type: ["string", "null"] }
        body:          { type: ["string", "null"] }
        bodyZh:        { type: ["string", "null"] }
        goalId:        { type: ["integer", "null"] }
        status:        { type: string }

    AdminCollectionInput:
      type: object
      properties:
        slug:          { type: string }
        name:          { type: string }
        nameZh:        { type: string }
        descriptionZh: { type: ["string", "null"] }
        goalId:        { type: ["integer", "null"] }
        retailerId:    { type: ["integer", "null"] }
        mealType:      { type: string }
        status:        { type: string }
        productIds:    { type: array, items: { type: integer } }

    # ── Admin ─────────────────────────────────────────────────────────────

    ReviewDecision:
      type: object
      required: [reviewedBy]
      properties:
        reviewedBy: { type: string }
        note:       { type: ["string", "null"] }

    ProductUpdate:
      type: object
      properties:
        name:               { type: string }
        nameZh:             { type: ["string", "null"] }
        ingredientsList:    { type: ["string", "null"] }
        verificationStatus: { type: ["string", "null"] }
        imageUrl:           { type: ["string", "null"] }
        priceNtd:           { type: ["number", "null"] }
        netWeight:          { type: ["string", "null"] }
